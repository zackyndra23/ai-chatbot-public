# Local-only compose file for GPU verification.
# Standalone — does NOT extend docker-compose.yml. Runs with:
#   docker compose -f docker-compose.local.yml up -d
#
# Differences vs. production docker-compose.yml:
#   - builds image locally from Dockerfile.prod (target=runtime_cuda)
#   - uses modern Compose Spec GPU syntax (deploy.resources.reservations.devices)
#     instead of legacy `device_requests` (deprecated in Compose CLI v2.x)
#   - no version: field (Compose Spec deprecated it)

services:
  rag_chatbot:
    build:
      context: .
      dockerfile: Dockerfile.local
      target: runtime_cuda
    image: rag-cuda:local
    env_file:
      - .env
    ports:
      - "2300:2300"
    restart: unless-stopped
    volumes:
      - rag_chroma_data:/app/vector_data
      - ./secrets:/app/secrets:ro
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]

volumes:
  rag_chroma_data:
