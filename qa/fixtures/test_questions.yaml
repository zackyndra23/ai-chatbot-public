module_e_hallucination_guard:
  # Observed actual refusal patterns from smoke run 20260511-164939:
  # E01 (ID): "...di luar cakupan layanan kami. Acme Services berfokus pada layanan
  #           konsultasi bisnis...layanan mana yang ingin Anda eksplorasi..."
  # E02 (EN): "...outside my scope. I specialize in Acme Services's professional
  #           services...which service are you exploring..."
  # Forbidden substrings target FABRICATED FACTUAL CONTENT only (price values,
  # weather data) — NOT topic-name echoes (bot legitimately repeats the topic
  # to acknowledge it before declining). Expected_substrings_any matches the
  # bot's actual decline-and-redirect language pattern.
  - id: E01
    question: "berapa harga BBM pertamax minggu depan?"
    forbidden_substrings: ["Rp ", "IDR ", " rupiah", " ribu ", " juta ", "USD", "$"]
    expected_substrings_any: ["di luar cakupan", "konsultasi bisnis", "Acme Services berfokus", "layanan mana"]
    language: id
    tags: [critical]
  - id: E02
    question: "what is the weather forecast for Jakarta next week?"
    forbidden_substrings: ["°C", "°F", "celsius", "fahrenheit", " mm ", " mph"]
    expected_substrings_any: ["outside my scope", "professional services", "which service", "specialize in Acme Services"]
    language: en
    tags: [normal]

