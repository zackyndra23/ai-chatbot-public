# English baselines — Stage 0 OOC engine (2026-05-13).
# All entries status: verified per spec Appendix A + B.
# Text per spec §3 + Appendix A (cold-start) + Appendix B (mid-flow P1).

# ============================================================================
# Cold-start templates (13 categories)
# ============================================================================

ooc.OOC-PARTNERSHIP.cold_start:
  text: |
    Thanks for considering a partnership with Integrity — collaborations like this are outside our qualification scope, but we'd be glad to route you to the right team.

    Please complete the partnership application at {partnership_url} so we can learn about your organization. Once submitted, our Partnerships team will follow up directly.

    If you'd prefer to speak with someone first, you can also reach our Sales team at {indo_email} or {indo_phone} ({business_hours}).
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-FREELANCE.cold_start:
  text: |
    Thank you for your interest in joining us on a freelance basis — talent applications are handled outside the qualification flow.

    Please apply through {freelancer_url} and let us know the types of projects you're passionate about. Our team reviews every application and will contact you if your profile matches an open need.

    Note: If you're specifically interested in becoming a Mystery Shopper, that has a dedicated application — happy to share the link instead, just let me know.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-MYSTERY-SHOPPER-APPLY.cold_start:
  text: |
    Great — we welcome applications for Mystery Shopper roles.

    Please complete the application form here: {mystery_shopper_url}

    Our team will reach out for next steps if your qualifications meet our criteria.

    Heads-up: this is for joining our shopper pool. If you're a business looking to commission a Mystery Shopping engagement, I can help with that qualification right here.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-CAREERS.cold_start:
  text: |
    Thanks for your interest in joining Integrity! Full-time openings and internships are managed outside my scope.

    You can explore current openings at {careers_url} and apply directly to any role that matches your background. Our team reviews every application.

    If you don't see a fitting role, you're welcome to send your CV to {indo_email} with the subject line "Career Inquiry — {user_field_hint}".
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-ADJACENT-SERVICE.cold_start:
  text: |
    Thanks for the question. {mentioned_service} sits outside Integrity's current service portfolio — we focus on compliance, risk, and investigation services for organizations.

    We support inquiries across our four service pillars:

    {pillar_block}

    If any of these match what you actually need, I can take you through the qualification right now. If you'd like a referral or to explore adjacent options with our team, please reach out at {indo_email} or {indo_phone}.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-ADJACENT-ISO.cold_start:
  text: |
    Integrity doesn't issue ISO certifications — those must come from an accredited certification body.

    What we do offer is the ABMS E-Learning module, which prepares your team for ISO 37001 (Anti-Bribery Management System) certification with comprehensive coverage from awareness through best practices. Organizations typically use it alongside an accredited body's audit cycle.

    Would you like to walk through whether the ABMS E-Learning fits your needs? Otherwise, I can connect you to our Sales team at {indo_email} or {indo_phone}.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-PRESS-MEDIA.cold_start:
  text: |
    Thanks for reaching out — media and press inquiries are handled outside my scope by our Communications team.

    Please email {indo_email} with the subject line "Media Inquiry — [Outlet / Topic]" along with your deadline and outline, and the team will respond as soon as possible during business hours ({business_hours}).
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-VENDOR-SUPPLIER.cold_start:
  text: |
    Thanks for reaching out. Vendor and procurement inquiries are outside my scope — I'm built to qualify client inquiries about our compliance and investigation services.

    Please send a brief introduction of your offering to {indo_email} with the subject line "Vendor Inquiry — [Category]". Our procurement team will route it internally if there's a fit.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-COMPLAINT.cold_start:
  text: |
    I'm sorry to hear that, and thank you for letting us know. Service-quality concerns need to be reviewed by a human team member rather than handled here in chat.

    Please email {indo_email} with the subject line "Service Concern — {engagement_reference}". A senior team member will respond during business hours ({business_hours}).

    For urgent matters, you can also call {indo_phone} directly.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-PERSONAL-ADVICE.cold_start:
  text: |
    That's outside what I can help with — I'm focused on Integrity's organizational compliance and investigation services rather than personal legal, financial, or health matters. For personal advice, please consult a qualified professional in that field.

    If there's anything organizational I can help with — for example, employment screening or fraud investigation for a company — I'd be glad to walk you through it.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-CHITCHAT.cold_start:
  text: |
    That's a bit outside what I'm built for — I'm here to help with Integrity's compliance, risk, and investigation services.

    I support inquiries across our four service pillars:

    {pillar_block}

    Is there a service area I can help you explore?
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-UNCLEAR.cold_start:
  text: |
    Happy to help — to point you in the right direction, could you tell me a little more about what you're looking for?

    I support inquiries across our four service pillars:

    {pillar_block}

    Which of these is closest to your need? Or if it's something else entirely, please describe the situation and I'll do my best to route you.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

ooc.OOC-CATCHALL.cold_start:
  text: |
    That falls outside what I can help with directly. For anything not covered here, the best path is to reach our Sales team — they can route you internally or refer you to the right partner.

    • Indonesia: {indo_phone}  |  {indo_email}
    • Malaysia / Singapore: {my_sg_phone}  |  {my_sg_email}
    • Thailand / Vietnam: {th_vn_phone}  |  {th_vn_email}
    • Business hours: {business_hours}

    If there's an Integrity service I can help you qualify for instead, just let me know.
  status: verified
  reviewer: "@design"
  reviewed_date: "2026-05-13"
  ai_assisted: false

