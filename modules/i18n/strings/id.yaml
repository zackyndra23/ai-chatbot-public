# ============================================================================
# Pillar block (Indonesian — pillar names translated, service line names stay English per glossary policy)
# ============================================================================

ooc.service.taxonomy.pillar_block:
  text: |
    • Pencegahan (Prevention) — Employment Background Screening (EBS), Due Diligence, Know Your Customer, ABMS E-Learning
    • Deteksi (Detection) — Whistleblowing System (WBS), Mystery Shopping, Market Survey
    • Mitigasi (Mitigation) — Corporate Fraud Investigation, Insurance Claim Investigation, Asset Tracing, Skip Tracing
    • Perlindungan Merek (Brand Protection) — Non-Use Investigation, Anti-Counterfeit Investigation, Parallel Trading Investigation, Trademark Investigation
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

