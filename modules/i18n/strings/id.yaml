# Indonesian translations — Stage 0 Phase 2a (2026-05-13).
# All entries status: draft — awaiting Indonesian SME validation per spec §6.1.
# OOC-COMPLAINT cold_start + mid_flow_p1: source = docs/i18n/sample-translations-2026-05-13.md Sample 1.1 / 1.6
# OOC-ADJACENT-SERVICE cold_start + mid_flow_p1: source = Sample 2.3 / 2.4
# Tone calibration per spec §4.5: "Anda" formal; no banned forms (kamu/kau/lu/Baik/Baiklah/dijelasin).
# Subject-line tags stay English (Constraint #6).

# ============================================================================
# Cold-start templates
# ============================================================================

ooc.OOC-PARTNERSHIP.cold_start:
  text: |
    Terima kasih atas minat Anda untuk bermitra dengan Integrity — kolaborasi seperti ini berada di luar lingkup kualifikasi kami, namun kami dengan senang hati akan mengarahkan Anda ke tim yang tepat.

    Silakan lengkapi formulir aplikasi kemitraan di {partnership_url} agar kami dapat mengenal organisasi Anda. Setelah dikirim, tim Kemitraan kami akan menindaklanjutinya secara langsung.

    Jika Anda ingin berbicara dengan tim kami terlebih dahulu, Anda juga dapat menghubungi tim Sales di {indo_email} atau {indo_phone} ({business_hours}).
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-FREELANCE.cold_start:
  text: |
    Terima kasih atas minat Anda untuk bergabung secara freelance — aplikasi talenta ditangani di luar alur kualifikasi.

    Silakan mendaftar melalui {freelancer_url} dan beri tahu kami jenis proyek yang Anda minati. Tim kami meninjau setiap aplikasi dan akan menghubungi Anda jika profil Anda sesuai dengan kebutuhan yang sedang dibuka.

    Catatan: Jika Anda secara khusus tertarik menjadi Mystery Shopper, terdapat aplikasi khusus untuk itu — saya dapat membagikan tautannya, cukup beri tahu saya.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-MYSTERY-SHOPPER-APPLY.cold_start:
  text: |
    Bagus — kami menerima aplikasi untuk peran Mystery Shopper.

    Silakan isi formulir aplikasi di sini: {mystery_shopper_url}

    Tim kami akan menghubungi Anda untuk langkah berikutnya jika kualifikasi Anda memenuhi kriteria.

    Catatan: Ini untuk bergabung ke pool shopper kami. Jika Anda mewakili bisnis yang ingin menggunakan layanan Mystery Shopping, saya dapat membantu kualifikasinya di sini.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-CAREERS.cold_start:
  text: |
    Terima kasih atas minat Anda untuk bergabung dengan Integrity! Lowongan penuh waktu dan magang dikelola di luar lingkup saya.

    Anda dapat melihat lowongan saat ini di {careers_url} dan melamar langsung ke posisi yang sesuai dengan latar belakang Anda. Tim kami meninjau setiap aplikasi.

    Jika Anda tidak melihat posisi yang cocok, silakan kirim CV Anda ke {indo_email} dengan baris subjek "Career Inquiry — {user_field_hint}".
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-ADJACENT-SERVICE.cold_start:
  text: |
    Terima kasih atas pertanyaan Anda. {mentioned_service} berada di luar portofolio layanan Integrity saat ini — kami berfokus pada layanan compliance, risiko, dan investigasi untuk organisasi.

    Kami mendukung pertanyaan terkait empat pilar layanan kami:

    {pillar_block}

    Jika salah satu dari layanan tersebut sesuai dengan kebutuhan Anda, saya dapat memandu Anda melalui kualifikasinya sekarang. Untuk rujukan atau opsi terkait lainnya bersama tim kami, silakan hubungi {indo_email} atau {indo_phone}.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-ADJACENT-ISO.cold_start:
  text: |
    Integrity tidak menerbitkan sertifikasi ISO — sertifikasi tersebut harus berasal dari badan sertifikasi terakreditasi.

    Yang kami tawarkan adalah modul ABMS E-Learning, yang menyiapkan tim Anda untuk sertifikasi ISO 37001 (Anti-Bribery Management System) dengan cakupan komprehensif dari kesadaran hingga praktik terbaik. Organisasi biasanya menggunakannya bersamaan dengan siklus audit dari badan terakreditasi.

    Apakah Anda ingin saya jelaskan apakah ABMS E-Learning sesuai dengan kebutuhan Anda? Atau saya dapat menghubungkan Anda ke tim Sales di {indo_email} atau {indo_phone}.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-PRESS-MEDIA.cold_start:
  text: |
    Terima kasih telah menghubungi kami — pertanyaan media dan pers ditangani di luar lingkup saya oleh tim Communications kami.

    Silakan kirim email ke {indo_email} dengan baris subjek "Media Inquiry — [Outlet / Topic]" beserta tenggat waktu dan ringkasan Anda, dan tim akan merespons sesegera mungkin pada jam kerja ({business_hours}).
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-VENDOR-SUPPLIER.cold_start:
  text: |
    Terima kasih telah menghubungi kami. Pertanyaan vendor dan pengadaan berada di luar lingkup saya — saya dirancang untuk mengkualifikasi pertanyaan klien tentang layanan compliance dan investigasi kami.

    Silakan kirim perkenalan singkat tentang penawaran Anda ke {indo_email} dengan baris subjek "Vendor Inquiry — [Category]". Tim pengadaan kami akan meneruskannya secara internal jika sesuai.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-COMPLAINT.cold_start:
  text: |
    Saya turut menyesal mendengar hal ini, dan terima kasih telah menyampaikannya kepada kami. Kekhawatiran terkait kualitas layanan perlu ditinjau oleh anggota tim kami secara langsung, bukan melalui obrolan ini.

    Mohon kirim email ke {indo_email} dengan baris subjek "Service Concern — {engagement_reference}". Anggota tim senior kami akan menanggapi Anda pada jam kerja ({business_hours}).

    Untuk hal-hal yang mendesak, Anda juga dapat menghubungi {indo_phone} secara langsung.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-PERSONAL-ADVICE.cold_start:
  text: |
    Hal tersebut di luar yang dapat saya bantu — saya berfokus pada layanan compliance dan investigasi organisasi Integrity, bukan urusan pribadi seperti hukum, keuangan, atau kesehatan. Untuk nasihat pribadi, silakan berkonsultasi dengan profesional yang berkualifikasi di bidang tersebut.

    Jika ada hal terkait organisasi yang dapat saya bantu — misalnya pemeriksaan latar belakang karyawan atau investigasi fraud untuk perusahaan — saya dengan senang hati akan memandu Anda.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-CHITCHAT.cold_start:
  text: |
    Hal tersebut sedikit di luar fungsi saya — saya di sini untuk membantu dengan layanan compliance, risiko, dan investigasi dari Integrity.

    Saya mendukung pertanyaan terkait empat pilar layanan kami:

    {pillar_block}

    Apakah ada area layanan yang dapat saya bantu Anda telusuri?
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-UNCLEAR.cold_start:
  text: |
    Dengan senang hati membantu — agar saya dapat mengarahkan Anda dengan tepat, dapatkah Anda menjelaskan lebih lanjut apa yang Anda cari?

    Saya mendukung pertanyaan terkait empat pilar layanan kami:

    {pillar_block}

    Manakah dari layanan ini yang paling dekat dengan kebutuhan Anda? Atau jika kebutuhan Anda sesuatu yang lain, silakan jelaskan situasinya dan saya akan berupaya semaksimal mungkin untuk mengarahkan Anda.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

ooc.OOC-CATCHALL.cold_start:
  text: |
    Hal tersebut berada di luar yang dapat saya bantu secara langsung. Untuk hal-hal yang tidak tercakup di sini, jalur terbaik adalah menghubungi tim Sales kami — mereka dapat mengarahkan Anda secara internal atau merujuk Anda ke mitra yang tepat.

    • Indonesia: {indo_phone}  |  {indo_email}
    • Malaysia / Singapura: {my_sg_phone}  |  {my_sg_email}
    • Thailand / Vietnam: {th_vn_phone}  |  {th_vn_email}
    • Jam kerja: {business_hours}

    Jika ada layanan Integrity yang dapat saya bantu kualifikasinya, silakan beri tahu saya.
  status: draft
  reviewer: "@indonesia-team"
  reviewed_date: null
  ai_assisted: true

