# Authoritative i18n key catalog for the chatbot.
#
# Stage 0 (2026-05-13) — OOC Response Engine + abandonment handler.
# Per spec docs/superpowers/specs/2026-05-13-ooc-response-engine-design.md §4.2.
#
# Per-key fields:
#   surface             — broad category (ooc, abandonment, greeting, opener, ...)
#   category            — OOC category enum value (when applicable)
#   shape               — cold_start | mid_flow_* | escalation_handover (when applicable)
#   placeholders        — list of {placeholder_name} tokens the text must contain
#   type                — "list" for palette-style entries; omit for normal string templates
#   max_words           — target word ceiling (loader checks at max_words × 1.1)
#   tone                — formality enum (per spec §4.5)
#   required_for        — langs that MUST have this key at startup (CRITICAL if missing)
#   auto_bidi_wrap_extracted_vars — if true, extracted_mention/_hint get bidi-wrapped for RTL
#   template_variant_for_lang — per-lang variant override map (D6 row 11)
#   field_label_lang_exceptions — list of lang codes that skip the noun-phrase lint rule
#   notes               — free-form context for translators

