# Glossary — service line labels, field labels, common UI terms per language.
#
# Per spec §4.9. Used by OOCRenderer (Task 8 + 9) to resolve {active_service_label}
# and {current_field_label} placeholders in mid-flow shapes.
#
# Stage 0 Phase 2a scope: en + id. Other 15 langs land in Phase 2b/2c/2d.
#
# Service line names policy (per glossary.yaml policy matrix):
#   - English markets / global: keep service line name fully English
#   - Indonesian / Asian markets: bilingual format "<localized> (<English>)" OR pure English
#     for terms with no good local equivalent (e.g., "Mystery Shopping", "ABMS E-Learning").
#
# Field labels: noun phrases per spec §4.9 Refinement (D4). Per-lang exceptions
# tracked via field_label_lang_exceptions in schema.yaml when needed.

